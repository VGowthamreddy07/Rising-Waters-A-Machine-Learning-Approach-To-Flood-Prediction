<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>🌊 Rising Waters - Flood Prediction</h2>

    <form action="/predict" method="post">
        <input type="number" name="rainfall" placeholder="Rainfall (mm)" required>
        <input type="number" name="temperature" placeholder="Temperature (°C)" required>
        <input type="number" name="humidity" placeholder="Humidity (%)" required>
        <input type="number" step="0.1" name="water_level" placeholder="Water Level (m)" required>
        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>
</div>

</body>
</html>
